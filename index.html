<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNCED Club | Official Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --neon-lime: #39ff14;
            --neon-orange: #ff4500;
            --dark-bg: #020202;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-bg);
            color: white; overflow-x: hidden;
        }

        /* NAVIGATION */
        nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-cyan); z-index: 1000;
        }
        .menu-icon { font-size: 30px; margin-left: 15px; cursor: pointer; color: var(--neon-cyan); }
        .site-title { font-size: 1.3rem; font-weight: 800; letter-spacing: 4px; }
        #ist-clock { margin-right: 15px; color: var(--neon-cyan); font-weight: bold; font-size: 0.9rem; }

        /* SIDE MENU */
        .side-menu {
            position: fixed; left: -300px; top: 60px; height: 100vh;
            width: 260px; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; gap: 12px; padding: 25px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 999; border-right: 2px solid var(--neon-purple);
        }
        .side-menu.open { left: 0; }
        .menu-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon-cyan);
            color: white; padding: 15px; border-radius: 5px;
            cursor: pointer; text-align: left; font-weight: 600; text-transform: uppercase;
        }

        /* SHARP MOVING LASERS (NOT STRETCHY) */
        .home-section {
            position: relative; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; background: #000;
        }
        .laser-container {
            position: absolute; width: 100%; height: 100%;
            pointer-events: none; z-index: 1;
        }
        .laser-beam {
            position: absolute; height: 2px; width: 200%;
            background: linear-gradient(90deg, transparent, var(--color), transparent);
            filter: drop-shadow(0 0 8px var(--color));
            opacity: 0.8;
            animation: move-laser 4s linear infinite;
        }

        @keyframes move-laser {
            0% { transform: translateY(-100vh) rotate(var(--deg)); }
            100% { transform: translateY(100vh) rotate(var(--deg)); }
        }

        /* HERO CONTENT */
        .hero-container {
            position: relative; z-index: 10;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            padding: 40px; border-radius: 20px;
            border: 1px solid var(--neon-cyan);
            text-align: center;
        }
        .hero-title {
            font-size: clamp(2.5rem, 10vw, 5rem); margin: 0;
            text-shadow: 0 0 20px var(--neon-purple), 0 0 40px var(--neon-cyan);
        }

        /* GALLERY & LIGHTBOX */
        .page-section { min-height: 100vh; display: none; padding: 100px 20px 40px; text-align: center; flex-direction: column; align-items: center; }
        
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; width: 100%; max-width: 900px;
        }
        .gallery-grid img {
            width: 100%; aspect-ratio: 16/9; object-fit: cover;
            border-radius: 8px; border: 2px solid var(--neon-cyan);
            cursor: pointer; transition: 0.3s;
        }
        .gallery-grid img:hover { transform: scale(1.05); border-color: white; }

        /* LIGHTBOX OVERLAY */
        #lightbox {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            justify-content: center; align-items: center; z-index: 2000;
        }
        #lightbox img { max-width: 90%; max-height: 80%; border: 2px solid white; border-radius: 10px; }
        #lightbox-close { position: absolute; top: 20px; right: 30px; font-size: 40px; cursor: pointer; color: white; }

        @media (max-width: 600px) { .gallery-grid { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="site-title">SYNCED</div>
        <div id="ist-clock">IND: 00:00:00</div>
    </nav>

    <div class="side-menu" id="sideMenu">
        <button class="menu-btn" onclick="showSection('home')">Home</button>
        <button class="menu-btn" onclick="showSection('experience')">Experience</button>
        <button class="menu-btn" onclick="showSection('gamepass')">Gamepass</button>
        <button class="menu-btn" onclick="showSection('gallery')">Gallery</button>
    </div>

    <section id="home-section" class="home-section" style="display: flex;">
        <div class="laser-container" id="laserBox">
            </div>
        <div class="hero-container">
            <h1 class="hero-title">SYNCED CLUB</h1>
            <p style="color: var(--neon-cyan); font-weight: bold; margin-top: 15px;">WHERE WE SYNC, YOU FEEL THE MUSIC</p>
        </div>
    </section>

    <section id="gallery-section" class="page-section">
        <h1>CLUB GALLERY</h1>
        <p style="color: var(--neon-cyan); margin-bottom: 20px;">(Click any photo to view full size)</p>
        <div class="gallery-grid">
            <img src="image1.jpg" onclick="openLightbox(this.src)">
            <img src="image2.jpg" onclick="openLightbox(this.src)">
            <img src="image3.jpg" onclick="openLightbox(this.src)">
            <img src="image4.jpg" onclick="openLightbox(this.src)">
            <img src="image5.jpg" onclick="openLightbox(this.src)">
            <img src="image6.jpg" onclick="openLightbox(this.src)">
            <img src="image7.jpg" onclick="openLightbox(this.src)">
            <img src="image8.jpg" onclick="openLightbox(this.src)">
            <img src="image9.jpg" onclick="openLightbox(this.src)">
        </div>
    </section>

    <section id="experience-section" class="page-section">
        <div class="hero-container" style="max-width: 500px;">
            <h2>THE VIBE</h2>
            <p>Welcome to SYNCED Club! 🎧</p>
            <p>Enjoy high-quality synced songs and amazing vibes.</p>
            <p>✨ Worldwide tracks • 🔊 Best sound quality</p>
        </div>
    </section>

    <div id="lightbox" onclick="closeLightbox()">
        <span id="lightbox-close">&times;</span>
        <img id="lightbox-img">
    </div>

    <script>
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(id + '-section');
            target.style.display = 'flex';
            toggleMenu();
        }

        /* SHARP LASER ENGINE */
        const colors = ['#00f3ff', '#bc13fe', '#ff00ff', '#39ff14', '#ff4500'];
        const laserBox = document.getElementById('laserBox');

        function spawnLaser() {
            const beam = document.createElement('div');
            beam.className = 'laser-beam';
            const color = colors[Math.floor(Math.random() * colors.length)];
            const deg = Math.floor(Math.random() * 360);
            const left = Math.floor(Math.random() * 100);
            
            beam.style.setProperty('--color', color);
            beam.style.setProperty('--deg', deg + 'deg');
            beam.style.left = left + '%';
            
            laserBox.appendChild(beam);
            setTimeout(() => beam.remove(), 4000);
        }
        setInterval(spawnLaser, 300);

        /* LIGHTBOX FUNCTIONS */
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
        function closeLightbox() {
            document.getElementById('lightbox').style.display = 'none';
        }

        function updateClock() {
            const now = new Date();
            const istTime = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Kolkata', hour12: false });
            document.getElementById('ist-clock').innerHTML = "IND: " + istTime;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
