<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNCED Club | Official Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
            --neon-pink: #ff00ff;
            --neon-lime: #39ff14;
            --neon-orange: #ff4500;
            --dark-bg: #030303;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            font-family: 'Rajdhani', sans-serif;
            background-color: var(--dark-bg);
            color: white; overflow-x: hidden;
        }

        /* NAVIGATION BAR */
        nav {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--neon-cyan); z-index: 1000;
        }
        .menu-icon { font-size: 30px; margin-left: 15px; cursor: pointer; color: var(--neon-cyan); }
        .site-title { font-size: 1.3rem; font-weight: 800; letter-spacing: 4px; }
        #ist-clock { margin-right: 15px; color: var(--neon-cyan); font-weight: bold; font-size: 0.9rem; }

        /* SIDE MENU */
        .side-menu {
            position: fixed; left: -300px; top: 60px; height: 100vh;
            width: 260px; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; gap: 12px; padding: 25px;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            z-index: 999; border-right: 2px solid var(--neon-purple);
        }
        .side-menu.open { left: 0; }
        .menu-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--neon-cyan);
            color: white; padding: 15px; border-radius: 5px;
            cursor: pointer; text-align: left; font-weight: 600; text-transform: uppercase;
        }

        /* FIXED LIGHT SPEED LASERS */
        .home-section {
            position: relative; height: 100vh;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            overflow: hidden; text-align: center;
        }
        .laser-bg {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        .laser-bg::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: repeating-linear-gradient(45deg, 
                transparent 0%, var(--neon-cyan) 1%, 
                transparent 2%, var(--neon-purple) 3%, 
                transparent 4%, var(--neon-pink) 5%, 
                transparent 6%, var(--neon-lime) 7%, 
                transparent 8%, var(--neon-orange) 9%, 
                transparent 10%
            );
            opacity: 0.5;
            animation: hyper-speed 3s linear infinite;
        }

        @keyframes hyper-speed {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* GLASS CONTENT BOX */
        .hero-container {
            position: relative; z-index: 10;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            padding: 40px; border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }

        .hero-title {
            font-size: clamp(2.5rem, 10vw, 5rem); margin: 0;
            text-transform: uppercase; letter-spacing: 5px;
            text-shadow: 0 0 15px var(--neon-purple), 0 0 30px var(--neon-cyan);
        }

        /* PAGE SECTIONS */
        .page-section {
            min-height: 100vh; display: none; 
            padding: 100px 20px 40px; text-align: center;
            flex-direction: column; align-items: center; justify-content: center;
        }

        /* GALLERY (FIXED IMAGES) */
        .gallery-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 15px; width: 100%; max-width: 900px;
        }
        .gallery-grid img {
            width: 100%; aspect-ratio: 16/9; object-fit: cover;
            border-radius: 8px; border: 2px solid var(--neon-cyan);
        }

        /* MOBILE FIX */
        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(2, 1fr); }
            .hero-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="menu-icon" onclick="toggleMenu()">☰</div>
        <div class="site-title">SYNCED</div>
        <div id="ist-clock">IND: 00:00:00</div>
    </nav>

    <div class="side-menu" id="sideMenu">
        <button class="menu-btn" onclick="showSection('home')">Home</button>
        <button class="menu-btn" onclick="showSection('experience')">Experience</button>
        <button class="menu-btn" onclick="showSection('gamepass')">Gamepass</button>
        <button class="menu-btn" onclick="showSection('gallery')">Gallery</button>
    </div>

    <section id="home-section" class="home-section" style="display: flex;">
        <div class="laser-bg"></div>
        <div class="hero-container">
            <h1 class="hero-title">SYNCED CLUB</h1>
            <p style="color: var(--neon-cyan); font-weight: bold; margin-top: 15px;">WHERE WE SYNC, YOU FEEL THE MUSIC</p>
        </div>
    </section>

    <section id="gallery-section" class="page-section">
        <h1 style="margin-bottom: 30px; text-shadow: 0 0 10px var(--neon-cyan);">GALLERY</h1>
        <div class="gallery-grid">
            <img src="image1.jpg"><img src="image2.jpg"><img src="image3.jpg">
            <img src="image4.jpg"><img src="image5.jpg"><img src="image6.jpg">
            <img src="image7.jpg"><img src="image8.jpg"><img src="image9.jpg">
        </div>
    </section>

    <section id="experience-section" class="page-section">
        <div class="hero-container" style="max-width: 500px;">
            <p>Welcome to SYNCED Club! 🎧</p>
            <p>Enjoy high-quality synced songs and amazing vibes.</p>
            <p>✨ Worldwide tracks • 🔊 Best sound quality</p>
        </div>
    </section>

    <section id="gamepass-section" class="page-section">
        <h1 style="color: var(--neon-purple);">GAMEPASS SHOP</h1>
        <div style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 20px;">
            <div style="border: 1px solid var(--neon-cyan); padding: 20px; border-radius: 10px;">VIP: 1 Robux</div>
            <div style="border: 1px solid var(--neon-cyan); padding: 20px; border-radius: 10px;">VVIP: 149 Robux</div>
        </div>
    </section>

    <script>
        function toggleMenu() { document.getElementById('sideMenu').classList.toggle('open'); }

        function showSection(id) {
            document.querySelectorAll('section').forEach(s => s.style.display = 'none');
            const target = document.getElementById(id + '-section');
            target.style.display = 'flex';
            toggleMenu();
        }

        function updateClock() {
            const now = new Date();
            const istTime = now.toLocaleTimeString('en-GB', { timeZone: 'Asia/Kolkata', hour12: false });
            document.getElementById('ist-clock').innerHTML = "IND: " + istTime;
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
